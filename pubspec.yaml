name: hilt_mobile
description: Companion app for Hilt Watch.
publish_to: 'none'
version: 1.0.8+34

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hilt_core:
    path: ../hilt_core
  isar: ^3.1.0
  camera: ^0.10.6
  # CameraX replaces Camera2 on Android — fixes flash/stream race on older HALs.
  camera_android_camerax: ^0.6.3
  fl_chart: ^0.65.0
  provider: ^6.0.0
  intl: ^0.18.0
  watch_connectivity: ^0.2.6
  audioplayers: ^5.0.0
  flutter_tts: ^3.7.0
  share_plus: ^12.0.1
  shared_preferences: ^2.2.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  flutter_ftms: ^1.1.3
  permission_handler: ^11.0.0
  flutter_blue_plus: ^1.36.8
  wakelock_plus: ^1.4.0
  google_fonts: ^8.0.0
  lottie: ^3.1.2
  confetti: ^0.8.0
  workmanager: ^0.9.0+3
  pedometer: ^4.2.0
  health: ^13.3.1
  sensors_plus: ^7.0.0
  heart_bpm: ^2.0.0+0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/animations/
    - assets/images/
