name: Deploy – Play Store & TestFlight

# ── Trigger ────────────────────────────────────────────────────────────────────
# Runs automatically when you push a semver tag (e.g. git tag v1.1.0 && git push origin v1.1.0)
# Can also be triggered manually from the Actions tab.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # matches v1.0.0, v2.3.1, etc.
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to deploy"
        required: true
        default: "both"
        type: choice
        options: [both, android, ios]

# ── Concurrency ────────────────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # ANDROID → Play Store (internal track)
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-android:
    name: Android → Play Store
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed for git describe (tag-based versioning)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: hilt_mobile

      - name: Flutter pub get
        working-directory: hilt_mobile
        run: flutter pub get

      # Decode the Play Store service account JSON from a GitHub secret
      - name: Write Play Store key
        working-directory: hilt_mobile
        env:
          PLAY_STORE_JSON_KEY_CONTENT: ${{ secrets.PLAY_STORE_JSON_KEY_CONTENT }}
        run: |
          echo "$PLAY_STORE_JSON_KEY_CONTENT" > play-store-key.json
          echo "PLAY_STORE_JSON_KEY_PATH=$(pwd)/play-store-key.json" >> $GITHUB_ENV

      # Decode the Android release keystore
      - name: Write Android keystore
        working-directory: hilt_mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/upload-keystore.jks

      - name: Write key.properties
        working-directory: hilt_mobile/android
        env:
          KEY_ALIAS:     ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/upload-keystore.jks
          EOF

      - name: Deploy to Play Store
        working-directory: hilt_mobile
        run: bundle exec fastlane android deploy_play_store

  # ──────────────────────────────────────────────────────────────────────────────
  # iOS → TestFlight
  # ──────────────────────────────────────────────────────────────────────────────
  deploy-ios:
    name: iOS → TestFlight
    runs-on: macos-14    # Apple Silicon runner with Xcode 15
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: hilt_mobile

      - name: Flutter pub get
        working-directory: hilt_mobile
        run: flutter pub get

      - name: Install pods
        working-directory: hilt_mobile/ios
        run: pod install --repo-update

      # Write ASC API key for upload_to_testflight
      - name: Write App Store Connect API key
        working-directory: hilt_mobile
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$ASC_API_KEY_CONTENT" > AuthKey.p8
          echo "APP_STORE_CONNECT_API_KEY_PATH=$(pwd)/AuthKey.p8" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_API_KEY_ID=${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}" >> $GITHUB_ENV

      - name: Deploy to TestFlight
        working-directory: hilt_mobile
        env:
          MATCH_GIT_URL:          ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:         ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_NAME:    fastlane_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          APPLE_ID:               ${{ secrets.APPLE_ID }}
          ITC_TEAM_ID:            ${{ secrets.ITC_TEAM_ID }}
          APPLE_TEAM_ID:          ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios deploy_testflight
